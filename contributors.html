<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contributors - Heated City</title>
    <meta name="description" content="The fictional climate coordinators who document their neighborhoods on Heated City.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Contributors - Heated City">
    <meta property="og:description" content="The fictional climate coordinators who document their neighborhoods on Heated City.">
    <meta property="og:image" content="https://nbronzina.github.io/heated.cityv2/img/hero.webp">
    <meta property="og:url" content="https://nbronzina.github.io/heated.cityv2/contributors.html">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous" />
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-left">
            <a href="index.html" class="logo">Heated City</a>
            <button class="search-icon" onclick="openSearch()" aria-label="Search cities and neighborhoods">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
            </button>
        </div>
        
        <nav class="main-nav">
            <a href="index.html#cities">Cities</a>
            <a href="contributors.html">Contributors</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <!-- Contributors Hero -->
    <section class="contributors-hero">
        <div class="contributors-hero-content">
            <h1>Contributors</h1>
            <p>A directory of the climate coordinators and care infrastructure designers around the world who document their neighborhoods on Heated City.</p>
        </div>
    </section>

    <!-- Contributors Content -->
    <section class="contributors-content">
        <!-- Map Section -->
        <div class="contributors-map">
            <div id="contributorsMap"></div>
        </div>

        <!-- Contributor cards (generated by js/contributors.js) -->
        <div class="contributors-grid" id="contributorsGrid"></div>
    </section>

    <!-- Search Modal -->
    <div id="searchModal" class="search-modal">
        <div class="search-modal-content">
            <div class="search-header">
                <div class="search-icon-large">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                </div>
                <div class="search-input-wrapper">
                    <input 
                        type="text" 
                        class="search-input" 
                        id="searchInput"
                        placeholder="Search Cities and Neighborhoods"
                        autocomplete="off"
                    >
                </div>
                <button class="search-close" onclick="closeSearch()" aria-label="Close search">×</button>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
    
    <!-- JavaScript -->
    <script src="js/contributors.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
